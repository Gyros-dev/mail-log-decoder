<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KASSIR.RU — декодер почтовых логов</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <img src="assets/kassir.png" alt="KASSIR.RU">
    <div>
      <h1>Декодер почтовых логов</h1>
      <p>Вставьте Postfix/SMTP-лог — MIME-фрагменты <code>=?utf-8?Q?...?=</code> и <code>=?utf-8?B?...?=</code> превратятся в читаемый текст.</p>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-title">
        <div><span class="eyebrow">Входные данные</span><h2>Исходные логи</h2></div>
        <button class="button ghost" id="clearBtn" type="button">Очистить</button>
      </div>
      <textarea id="input" spellcheck="false" placeholder="Вставьте сюда строки логов — результат появится справа автоматически"></textarea>
      <div class="actions">
        <button class="button primary" id="decodeBtn" type="button">Декодировать</button>
        <button class="button" id="sampleBtn" type="button">Вставить пример</button>
      </div>
      <p class="hint">Всё работает локально в браузере. Данные никуда не отправляются.</p>
    </section>

    <section class="panel">
      <div class="panel-title">
        <div><span class="eyebrow">Результат</span><h2>Декодированный лог</h2></div>
        <button class="button" id="copyBtn" type="button">Скопировать</button>
      </div>
      <pre id="output" data-placeholder="Здесь появится декодированный лог"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
