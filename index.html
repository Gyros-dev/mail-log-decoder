<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mail Log MIME Decoder</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #20242d;
      --text: #f2f4f8;
      --muted: #aab1bf;
      --border: #303644;
      --accent: #7aa2ff;
      --ok: #75d38a;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--sans);
      background: radial-gradient(circle at top, #1b2130 0, var(--bg) 42%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header { margin-bottom: 22px; }

    h1 {
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
      margin: 0 0 10px;
      letter-spacing: -0.04em;
    }

    .lead {
      color: var(--muted);
      margin: 0;
      max-width: 860px;
      line-height: 1.5;
    }

    code {
      font-family: var(--mono);
      background: rgba(255,255,255,.06);
      padding: 2px 5px;
      border-radius: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 850px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }

    .card-head {
      padding: 14px 16px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid var(--border);
    }

    .card-title { font-weight: 700; }

    textarea, pre {
      width: 100%;
      min-height: 520px;
      border: 0;
      margin: 0;
      padding: 16px;
      background: transparent;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.55;
      resize: vertical;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    pre {
      background: var(--panel);
      overflow: auto;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 650;
      transition: .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 70%, var(--border));
    }

    button.primary {
      background: var(--accent);
      color: #061022;
      border-color: transparent;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
      line-height: 1.45;
    }

    .status {
      color: var(--ok);
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Mail Log MIME Decoder</h1>
      <p class="lead">
        Вставьте логи Postfix/SMTP. Декодер просто заменит MIME encoded-word фрагменты
        <code>=?utf-8?Q?...?=</code> и <code>=?utf-8?B?...?=</code> на читаемый текст.
      </p>
    </header>

    <div class="actions">
      <button class="primary" id="decodeBtn">Декодировать</button>
      <button id="copyBtn">Скопировать результат</button>
      <button id="clearBtn">Очистить</button>
      <button id="sampleBtn">Вставить пример</button>
      <span class="status" id="status"></span>
    </div>

    <section class="grid">
      <div class="card">
        <div class="card-head">
          <span class="card-title">Исходные логи</span>
        </div>
        <textarea id="input" spellcheck="false" placeholder="Вставьте сюда строки логов..."></textarea>
      </div>

      <div class="card">
        <div class="card-head">
          <span class="card-title">Декодированный лог</span>
        </div>
        <pre id="output"></pre>
      </div>
    </section>

    <p class="hint">
      Работает полностью в браузере. Ничего никуда не отправляется.
    </p>
  </main>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const statusEl = document.getElementById('status');

    const sample = `"timestamp","source","message"
"2026-06-14T05:41:26.872Z","94.140.212.24","0 2026-06-14T08:41:26.872585+03:00 relay postfix 25010  D3F90824B3: info: header Subject: =?utf-8?Q?=D0=92=D0=B0=D1=88_=D0=B7=D0=B0=D0=BA=D0=B0?=? =?utf-8?Q?=D0=B7_=D1=81=D0=BE=D0=B7=D0=B4=D0=B0=D0=BD!?= from unknown[10.11.25.22]; from=<no-reply@kassir.ru> to=<ekdveri@gmail.com> proto=ESMTP helo=<[127.0.0.1]>"`;

    function showStatus(text) {
      statusEl.textContent = text;
      window.clearTimeout(showStatus.timer);
      showStatus.timer = window.setTimeout(() => statusEl.textContent = '', 1800);
    }

    function bytesToString(bytes, charset) {
      const normalized = (charset || 'utf-8').toLowerCase().replace(/_/g, '-');
      const data = new Uint8Array(bytes);

      try {
        return new TextDecoder(normalized, { fatal: false }).decode(data);
      } catch (e) {
        try {
          return new TextDecoder('utf-8', { fatal: false }).decode(data);
        } catch (fallbackError) {
          return bytes.map(b => String.fromCharCode(b)).join('');
        }
      }
    }

    function decodeQToBytes(encoded) {
      const bytes = [];
      const clean = encoded.replace(/\r?\n[ \t]*/g, '');

      for (let i = 0; i < clean.length; i++) {
        const ch = clean[i];

        if (ch === '_') {
          bytes.push(0x20);
          continue;
        }

        if (ch === '=' && /^[0-9A-Fa-f]{2}$/.test(clean.slice(i + 1, i + 3))) {
          bytes.push(parseInt(clean.slice(i + 1, i + 3), 16));
          i += 2;
          continue;
        }

        bytes.push(ch.charCodeAt(0));
      }

      return bytes;
    }

    function decodeBase64ToBytes(base64) {
      let clean = base64.replace(/\s/g, '');
      clean = clean.replace(/=+/g, '');
      while (clean.length % 4 !== 0) clean += '=';

      try {
        const binary = atob(clean);
        return Array.from(binary, ch => ch.charCodeAt(0));
      } catch (e) {
        return [];
      }
    }

    function normalizeBrokenMimeBoundaries(text) {
      /*
        В некоторых логах граница между двумя MIME-частями выглядит так:
        ?=? =?utf-8?Q?...

        Нормальная граница должна быть:
        ?= =?utf-8?Q?...

        Лишний знак вопроса между частями потом превращается в "? " в результате:
        "Ваш зака? з создан!"

        Здесь мы убираем этот лишний вопросительный знак только тогда,
        когда он стоит между закрытием одного encoded-word и началом следующего.
      */
      return text.replace(/(\?=)\?[ \t\r\n]+(=\?[^?\s]+\?[bBqQ]\?)/g, '$1 $2');
    }

    function parseMimeWordAt(text, index) {
      const re = /=\?([^?\s]+)\?([bBqQ])\?([\s\S]*?)\?=/y;
      re.lastIndex = index;
      const match = re.exec(text);

      if (!match) return null;

      return {
        charset: match[1],
        encoding: match[2].toUpperCase(),
        encodedText: match[3],
        start: index,
        end: re.lastIndex
      };
    }

    function decodeMimeGroup(words) {
      let result = '';
      let i = 0;

      while (i < words.length) {
        const charset = words[i].charset;
        const encoding = words[i].encoding;
        const chunk = [words[i]];
        i++;

        while (
          i < words.length &&
          words[i].charset.toLowerCase() === charset.toLowerCase() &&
          words[i].encoding === encoding
        ) {
          chunk.push(words[i]);
          i++;
        }

        if (encoding === 'B') {
          const joinedBase64 = chunk.map(w => w.encodedText).join('');
          result += bytesToString(decodeBase64ToBytes(joinedBase64), charset);
        } else if (encoding === 'Q') {
          const joinedQ = chunk.map(w => w.encodedText).join('');
          result += bytesToString(decodeQToBytes(joinedQ), charset);
        } else {
          result += chunk.map(w => w.encodedText).join('');
        }
      }

      return result;
    }

    function decodeMimeWords(sourceText) {
      const text = normalizeBrokenMimeBoundaries(sourceText);
      let result = '';
      let i = 0;

      while (i < text.length) {
        const first = parseMimeWordAt(text, i);

        if (!first) {
          result += text[i];
          i++;
          continue;
        }

        const words = [first];
        let cursor = first.end;
        let lastWordEnd = first.end;

        while (true) {
          const whitespaceMatch = /^[ \t\r\n]+/.exec(text.slice(cursor));
          const whitespace = whitespaceMatch ? whitespaceMatch[0] : '';
          const nextStart = cursor + whitespace.length;
          const next = parseMimeWordAt(text, nextStart);

          if (!next) break;

          words.push(next);
          cursor = next.end;
          lastWordEnd = next.end;
        }

        result += decodeMimeGroup(words);
        i = lastWordEnd;
      }

      return result;
    }

    function decodeCsvEscapes(text) {
      return text
        .replace(/""/g, '"')
        .replace(/\\n/g, '\n')
        .replace(/\\t/g, '\t');
    }

    function decodeLogs() {
      const source = input.value;

      if (!source.trim()) {
        output.textContent = '';
        return;
      }

      output.textContent = decodeMimeWords(decodeCsvEscapes(source));
      showStatus('Готово');
    }

    document.getElementById('decodeBtn').addEventListener('click', decodeLogs);

    document.getElementById('copyBtn').addEventListener('click', async () => {
      await navigator.clipboard.writeText(output.textContent || '');
      showStatus('Скопировано');
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      input.value = '';
      output.textContent = '';
      showStatus('Очищено');
    });

    document.getElementById('sampleBtn').addEventListener('click', () => {
      input.value = sample;
      decodeLogs();
    });

    input.addEventListener('input', decodeLogs);
  </script>
</body>
</html>
